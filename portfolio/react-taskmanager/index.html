<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — React Task Manager</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; overflow-x: hidden; }

/* ===== LOADING SCREEN ===== */
.loader {
  position: fixed; inset: 0; z-index: 9999; background: #f0f2f5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity .5s ease, visibility .5s ease;
}
.loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-icon { font-size: 42px; animation: loaderBounce .6s ease infinite alternate; }
.loader-title { font-size: 24px; font-weight: 800; color: #6c63ff; margin-top: 12px; }
.loader-title span { color: #34d399; }
.loader-dots { display: flex; gap: 6px; margin-top: 16px; }
.loader-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #6c63ff;
  animation: dotBounce .6s ease infinite alternate;
}
.loader-dot:nth-child(2) { animation-delay: .15s; }
.loader-dot:nth-child(3) { animation-delay: .3s; }
@keyframes loaderBounce { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }
@keyframes dotBounce { 0% { transform: translateY(0); opacity: .4; } 100% { transform: translateY(-10px); opacity: 1; } }

/* ===== KEYFRAMES ===== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
@keyframes slideRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.5) translateY(10px); } 60% { transform: scale(1.05); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
@keyframes checkmark { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes priorityGlow { 0%, 100% { box-shadow: 0 0 0 0 transparent; } 50% { box-shadow: 0 0 8px 2px currentColor; } }
@keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }
@keyframes taskRemove { from { opacity: 1; transform: scale(1) translateX(0); } to { opacity: 0; transform: scale(0.9) translateX(-30px); } }
@keyframes starPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

/* ===== LAYOUT WRAPPER ===== */
.app-wrapper { opacity: 0; transition: opacity 0.5s ease; }
.app-wrapper.visible { opacity: 1; }

/* ===== HEADER ===== */
.header {
  background: white; padding: 16px 32px; display: flex; justify-content: space-between;
  align-items: center; border-bottom: 1px solid #e5e5e5; position: sticky; top: 0; z-index: 100;
  opacity: 0; transform: translateY(-100%);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.header.visible { opacity: 1; transform: translateY(0); }
.logo { font-size: 20px; font-weight: 800; color: #6c63ff; transition: transform 0.2s ease; }
.logo:hover { transform: scale(1.05); }
.logo span { color: #34d399; }
.header-center { display: flex; align-items: center; gap: 12px; flex: 1; max-width: 400px; margin: 0 24px; }
.search-input {
  width: 100%; padding: 8px 16px 8px 36px; border: 1px solid #e5e5e5; border-radius: 20px;
  font-size: 13px; outline: none; background: #f5f5f5; transition: all 0.3s ease;
  position: relative;
}
.search-input:focus { border-color: #6c63ff; background: white; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
.search-wrapper { position: relative; width: 100%; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #aaa; pointer-events: none; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-right span { transition: color 0.2s ease; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; background: #6c63ff22;
  display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
  transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer;
}
.avatar:hover { transform: scale(1.1); box-shadow: 0 2px 12px rgba(108,99,255,0.25); }

/* ===== LAYOUT ===== */
.layout { display: flex; min-height: calc(100vh - 57px); }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px; background: white; padding: 20px 16px; border-right: 1px solid #e5e5e5;
  position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto;
  opacity: 0; transform: translateX(-24px);
  transition: opacity 0.5s ease 0.2s, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
}
.layout.visible .sidebar { opacity: 1; transform: translateX(0); }
.sidebar-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
  font-size: 14px; color: #555; cursor: pointer; margin-bottom: 2px;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateX(-12px);
}
.sidebar-item.visible { opacity: 1; transform: translateX(0); }
.sidebar-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0;
  background: #6c63ff; border-radius: 8px 0 0 8px;
  transition: width 0.25s ease;
}
.sidebar-item:hover { background: #f5f5f5; transform: translateX(3px); }
.sidebar-item.active { background: #6c63ff11; color: #6c63ff; font-weight: 600; }
.sidebar-item.active::before { width: 3px; }
.sidebar-item .count {
  margin-left: auto; background: #eee; font-size: 11px; padding: 2px 8px;
  border-radius: 10px; color: #888; transition: all 0.25s ease;
}
.sidebar-item.active .count { background: #6c63ff22; color: #6c63ff; }
.sidebar-item:hover .count { transform: scale(1.08); }
.sidebar-divider { border-top: 1px solid #eee; margin: 16px 0; }

/* ===== MAIN ===== */
.main { flex: 1; padding: 24px 32px; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  opacity: 0; transform: translateY(-12px);
  transition: opacity 0.4s ease 0.4s, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
  flex-wrap: wrap; gap: 12px;
}
.layout.visible .top-bar { opacity: 1; transform: translateY(0); }
.top-bar h1 { font-size: 24px; }
.top-bar-right { display: flex; align-items: center; gap: 12px; }
.add-btn {
  background: linear-gradient(135deg, #6c63ff, #7c73ff); color: white; border: none;
  padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
}
.add-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, #7c73ff, #a855f7); opacity: 0;
  transition: opacity 0.3s ease;
}
.add-btn:hover::before { opacity: 1; }
.add-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 6px 24px rgba(108,99,255,0.35); }
.add-btn:active { transform: scale(0.97); }
.add-btn span { position: relative; z-index: 1; }

/* ===== PRIORITY FILTERS ===== */
.priority-filters {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  opacity: 0; transform: translateY(-8px);
  transition: opacity 0.4s ease 0.5s, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
}
.layout.visible .priority-filters { opacity: 1; transform: translateY(0); }
.filter-btn {
  padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 600;
  border: 1px solid #e5e5e5; background: white; color: #666; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; align-items: center; gap: 6px;
}
.filter-btn:hover { border-color: #6c63ff; color: #6c63ff; transform: translateY(-1px); }
.filter-btn.active { background: #6c63ff; color: white; border-color: #6c63ff; box-shadow: 0 2px 8px rgba(108,99,255,0.25); }
.filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
.filter-btn .dot.high { background: #f87171; }
.filter-btn .dot.medium { background: #fbbf24; }
.filter-btn .dot.low { background: #34d399; }

/* ===== COLUMNS ===== */
.columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.column {
  background: #f5f5f5; border-radius: 12px; padding: 16px; min-height: 400px;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.column.visible { opacity: 1; transform: translateY(0); }
.column-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
}
.column-header h3 { font-size: 14px; font-weight: 600; }
.column-header .badge {
  width: 24px; height: 24px; border-radius: 50%; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s ease;
}
.column-header:hover .badge { transform: scale(1.15); }
.badge.blue { background: #6c63ff22; color: #6c63ff; }
.badge.orange { background: #fb923c22; color: #fb923c; }
.badge.green { background: #34d39922; color: #34d399; }

/* ===== TASK CARDS ===== */
.task {
  background: white; border-radius: 10px; padding: 14px; margin-bottom: 10px;
  border: 1px solid #eee; cursor: pointer; position: relative; overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
              box-shadow 0.3s ease, border-color 0.3s ease;
  opacity: 0; transform: translateY(12px) scale(0.97);
}
.task.visible { opacity: 1; transform: translateY(0) scale(1); }
.task::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(108,99,255,0.04), transparent);
  pointer-events: none;
}
.task:hover::after {
  animation: shimmer 0.6s ease forwards;
}
.task:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  border-color: #6c63ff44;
}
.task .priority {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  transition: transform 0.2s ease;
}
.task:hover .priority { transform: scale(1.4); }
.task .priority.high { background: #f87171; animation: priorityGlow 2s ease-in-out infinite; color: #f87171; }
.task .priority.medium { background: #fbbf24; }
.task .priority.low { background: #34d399; }
.task h4 { font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; transition: color 0.2s ease; }
.task:hover h4 { color: #6c63ff; }
.task p { font-size: 12px; color: #888; line-height: 1.4; margin-bottom: 10px; }
.task-footer { display: flex; justify-content: space-between; align-items: center; }
.task-tags { display: flex; gap: 4px; }
.task-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 8px; background: #f0f0f0; color: #666;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.task:hover .task-tag { transform: scale(1.05); }
.task-tag.design { background: #a855f715; color: #a855f7; }
.task-tag.dev { background: #6c63ff15; color: #6c63ff; }
.task-tag.bug { background: #f8717115; color: #f87171; }
.task-tag.backend { background: #3b82f615; color: #3b82f6; }
.task-tag.devops { background: #f59e0b15; color: #f59e0b; }
.task-date { font-size: 11px; color: #aaa; }
.task-avatars { display: flex; }
.task-avatars .av {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid white;
  margin-left: -6px; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  transition: transform 0.2s ease, z-index 0.2s ease;
}
.task-avatars .av:first-child { margin-left: 0; }
.task:hover .task-avatars .av { transform: translateY(-2px); }
.task:hover .task-avatars .av:nth-child(2) { z-index: 2; transform: translateY(-2px) translateX(2px); }
.av.a { background: #6c63ff33; color: #6c63ff; }
.av.b { background: #f59e0b33; color: #f59e0b; }
.av.c { background: #34d39933; color: #34d399; }

/* ===== STAR TOGGLE ===== */
.task-star {
  position: absolute; top: 10px; right: 10px; background: none; border: none;
  cursor: pointer; font-size: 14px; color: #ddd; transition: all 0.2s ease;
  padding: 2px; line-height: 1; z-index: 2;
}
.task-star:hover { color: #fbbf24; transform: scale(1.2); }
.task-star.active { color: #fbbf24; }
.task-star.active:hover { color: #f59e0b; }
.task-star.pop { animation: starPop 0.3s ease; }

/* ===== ADD TASK BUTTON ===== */
.add-task {
  border: 2px dashed #ddd; border-radius: 10px; padding: 12px; text-align: center;
  color: #aaa; font-size: 13px; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.add-task:hover {
  border-color: #6c63ff; color: #6c63ff;
  transform: scale(1.02); background: #6c63ff08;
}

/* ===== COMPLETED TASK ===== */
.task.done { opacity: 0.65; }
.task.done h4 { text-decoration: line-through; color: #aaa; }
.task.done:hover h4 { color: #6c63ff; }
.task.removing {
  animation: taskRemove 0.4s ease forwards;
  pointer-events: none;
}

/* ===== MODAL OVERLAY ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  animation: overlayIn 0.25s ease;
  backdrop-filter: blur(2px);
}
.modal-overlay.closing { animation: fadeOut 0.2s ease forwards; }

/* ===== MODAL ===== */
.modal {
  background: white; border-radius: 16px; padding: 28px; width: 480px; max-width: 92vw;
  max-height: 85vh; overflow-y: auto; position: relative;
  animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-overlay.closing .modal { animation: fadeOut 0.2s ease forwards; }
.modal-close {
  position: absolute; top: 16px; right: 16px; background: none; border: none;
  font-size: 20px; cursor: pointer; color: #999; width: 32px; height: 32px;
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
}
.modal-close:hover { background: #f5f5f5; color: #333; transform: scale(1.1); }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; padding-right: 36px; }

/* ===== MODAL FORM ===== */
.modal-field { margin-bottom: 16px; }
.modal-field label {
  display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.modal-field input[type="text"],
.modal-field input[type="date"],
.modal-field textarea,
.modal-field select {
  width: 100%; padding: 10px 14px; border: 1px solid #e5e5e5; border-radius: 10px;
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  background: white;
}
.modal-field input:focus,
.modal-field textarea:focus,
.modal-field select:focus {
  border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
}
.modal-field textarea { resize: vertical; min-height: 80px; }

/* ===== INLINE EDITABLE ===== */
.editable-title {
  font-size: 18px; font-weight: 700; border: none; border-bottom: 2px solid transparent;
  outline: none; width: 100%; padding: 4px 0; background: transparent;
  transition: border-color 0.2s ease;
  font-family: inherit; color: #1a1a2e;
}
.editable-title:focus { border-bottom-color: #6c63ff; }
.editable-desc {
  font-size: 14px; border: none; border-bottom: 2px solid transparent;
  outline: none; width: 100%; padding: 4px 0; background: transparent;
  transition: border-color 0.2s ease; resize: none; min-height: 60px;
  font-family: inherit; color: #555; line-height: 1.5;
}
.editable-desc:focus { border-bottom-color: #6c63ff; }

/* ===== PRIORITY SELECTOR ===== */
.priority-selector { display: flex; gap: 10px; }
.priority-option {
  display: flex; align-items: center; gap: 6px; padding: 8px 16px;
  border: 2px solid #eee; border-radius: 10px; cursor: pointer;
  transition: all 0.2s ease; font-size: 13px; font-weight: 500;
}
.priority-option:hover { border-color: #ccc; transform: translateY(-1px); }
.priority-option.active-high { border-color: #f87171; background: #f8717111; color: #f87171; }
.priority-option.active-medium { border-color: #fbbf24; background: #fbbf2411; color: #d97706; }
.priority-option.active-low { border-color: #34d399; background: #34d39911; color: #059669; }
.priority-dot { width: 10px; height: 10px; border-radius: 50%; }
.priority-dot.high { background: #f87171; }
.priority-dot.medium { background: #fbbf24; }
.priority-dot.low { background: #34d399; }

/* ===== STATUS SELECTOR ===== */
.status-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.status-option {
  padding: 8px 16px; border: 2px solid #eee; border-radius: 10px; cursor: pointer;
  transition: all 0.2s ease; font-size: 13px; font-weight: 500;
}
.status-option:hover { border-color: #ccc; transform: translateY(-1px); }
.status-option.active { border-color: #6c63ff; background: #6c63ff11; color: #6c63ff; font-weight: 600; }

/* ===== TAG SELECTOR ===== */
.tag-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.tag-option {
  padding: 6px 14px; border: 2px solid #eee; border-radius: 10px; cursor: pointer;
  transition: all 0.2s ease; font-size: 12px; font-weight: 500;
}
.tag-option:hover { border-color: #ccc; }
.tag-option.active { border-color: #6c63ff; background: #6c63ff11; color: #6c63ff; }

/* ===== AVATAR SELECTOR ===== */
.avatar-selector { display: flex; gap: 8px; }
.avatar-option {
  width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s ease; opacity: 0.5;
}
.avatar-option:hover { opacity: 0.8; transform: scale(1.1); }
.avatar-option.active { opacity: 1; border-width: 2px; transform: scale(1.1); }
.avatar-option.av.a { background: #6c63ff33; color: #6c63ff; }
.avatar-option.av.b { background: #f59e0b33; color: #f59e0b; }
.avatar-option.av.c { background: #34d39933; color: #34d399; }
.avatar-option.active.av.a { border-color: #6c63ff; }
.avatar-option.active.av.b { border-color: #f59e0b; }
.avatar-option.active.av.c { border-color: #34d399; }

/* ===== MODAL BUTTONS ===== */
.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.btn-save {
  flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; background: linear-gradient(135deg, #6c63ff, #7c73ff); color: white;
  transition: all 0.25s ease;
}
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.35); }
.btn-save:active { transform: scale(0.97); }
.btn-delete {
  padding: 12px 20px; border: 2px solid #f87171; border-radius: 10px; font-size: 14px;
  font-weight: 600; cursor: pointer; background: white; color: #f87171;
  transition: all 0.25s ease;
}
.btn-delete:hover { background: #f87171; color: white; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(248,113,113,0.3); }
.btn-delete:active { transform: scale(0.97); }
.btn-create {
  flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; background: linear-gradient(135deg, #6c63ff, #7c73ff); color: white;
  transition: all 0.25s ease;
}
.btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.35); }
.btn-create:active { transform: scale(0.97); }

/* ===== EMPTY STATE ===== */
.column-empty {
  text-align: center; padding: 30px 16px; color: #bbb; font-size: 13px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bbb; }

/* ===== RESPONSIVE ===== */
@media(max-width:900px) {
  .sidebar { display: none; }
  .columns { grid-template-columns: 1fr; }
  .main { padding: 20px; }
  .header { padding: 14px 20px; }
  .header-center { display: none; }
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loader" id="loader">
  <div class="loader-icon">✅</div>
  <div class="loader-title">Task<span>Flow</span></div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<script>
(function() {
  /* ===== DATA MODEL ===== */
  var nextId = 100;
  var tasks = [
    { id: 1, title: 'Верстка главной страницы', desc: 'Адаптивная верстка hero-секции, фич и футера по новому макету', priority: 'high', status: 'todo', tags: ['Frontend'], date: '2025-05-22', avatars: ['А','М'], favorite: false },
    { id: 2, title: 'Дизайн мобильной версии', desc: 'Адаптация всех экранов под мобильные устройства 320-768px', priority: 'medium', status: 'todo', tags: ['Дизайн'], date: '2025-05-24', avatars: ['О'], favorite: false },
    { id: 3, title: 'Подбор иконок', desc: 'Найти иконки для разделов услуг и преимуществ', priority: 'low', status: 'todo', tags: ['Дизайн'], date: '2025-05-25', avatars: [], favorite: false },
    { id: 4, title: 'API каталога товаров', desc: 'Настройка эндпоинтов для фильтрации и поиска товаров', priority: 'high', status: 'inwork', tags: ['Backend'], date: '2025-05-21', avatars: ['А'], favorite: false },
    { id: 5, title: 'Форма обратной связи', desc: 'Валидация полей, отправка на email, уведомление об успехе', priority: 'medium', status: 'inwork', tags: ['Frontend'], date: '2025-05-23', avatars: ['М'], favorite: false },
    { id: 6, title: 'Исправить баг корзины', desc: 'Товар не удаляется при клике на кнопку «убрать» в корзине', priority: 'low', status: 'inwork', tags: ['Баг'], date: '2025-05-22', avatars: [], favorite: false },
    { id: 7, title: 'Настройка Tailwind', desc: 'Конфигурация темы, цветов и брейкпоинтов', priority: 'low', status: 'done', tags: ['Frontend'], date: '2025-05-18', avatars: [], favorite: false },
    { id: 8, title: 'Создание репозитория', desc: 'Инициализация Next.js проекта, настройка ESLint и Prettier', priority: 'low', status: 'done', tags: ['DevOps'], date: '2025-05-17', avatars: [], favorite: false },
    { id: 9, title: 'Логотип и брендбук', desc: 'Финальный вариант логотипа утверждён заказчиком', priority: 'low', status: 'done', tags: ['Дизайн'], date: '2025-05-16', avatars: [], favorite: false }
  ];

  /* ===== STATE ===== */
  var currentFilter = 'all';       // sidebar: all, inwork, done, favorites
  var currentPriority = 'all';     // priority filter: all, high, medium, low
  var searchQuery = '';            // search text

  var COLUMNS = [
    { key: 'todo',   title: 'К выполнению', badgeClass: 'blue' },
    { key: 'inwork', title: 'В работе',     badgeClass: 'orange' },
    { key: 'done',   title: 'Готово',       badgeClass: 'green' }
  ];

  var TAG_MAP = {
    'Frontend': 'dev',
    'Backend': 'backend',
    'Дизайн': 'design',
    'DevOps': 'devops',
    'Баг': 'bug'
  };

  var AVATAR_CLASSES = { 'А': 'a', 'М': 'b', 'О': 'c' };

  /* ===== HELPERS ===== */
  function formatDate(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    var months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return d.getDate() + ' ' + months[d.getMonth()];
  }

  function getFilteredTasks() {
    return tasks.filter(function(t) {
      // Sidebar filter
      if (currentFilter === 'inwork' && t.status !== 'inwork') return false;
      if (currentFilter === 'done' && t.status !== 'done') return false;
      if (currentFilter === 'favorites' && !t.favorite) return false;
      // Priority filter
      if (currentPriority !== 'all' && t.priority !== currentPriority) return false;
      // Search
      if (searchQuery && t.title.toLowerCase().indexOf(searchQuery.toLowerCase()) === -1) return false;
      return true;
    });
  }

  /* ===== RENDER ===== */
  function render(animate) {
    var container = document.getElementById('columnsContainer');
    var filtered = getFilteredTasks();

    var html = '';
    COLUMNS.forEach(function(col, colIdx) {
      // If sidebar filter is specific, only show relevant column
      if (currentFilter === 'inwork' && col.key !== 'inwork') return;
      if (currentFilter === 'done' && col.key !== 'done') return;

      var colTasks = filtered.filter(function(t) { return t.status === col.key; });
      var badgeCount = colTasks.length;

      html += '<div class="column' + (animate ? '' : ' visible') + '" data-status="' + col.key + '">';
      html += '<div class="column-header"><h3>' + col.title + '</h3>';
      html += '<div class="badge ' + col.badgeClass + '">' + badgeCount + '</div></div>';

      if (colTasks.length === 0) {
        html += '<div class="column-empty">Нет задач</div>';
      } else {
        colTasks.forEach(function(t, i) {
          var isDone = t.status === 'done' ? ' done' : '';
          var favClass = t.favorite ? ' active' : '';
          var starChar = t.favorite ? '★' : '☆';

          var tagsHtml = t.tags.map(function(tag) {
            var cls = TAG_MAP[tag] || '';
            return '<span class="task-tag ' + cls + '">' + tag + '</span>';
          }).join('');

          var avatarsHtml = '';
          if (t.avatars && t.avatars.length) {
            avatarsHtml = '<div class="task-avatars" style="margin-top:8px">';
            t.avatars.forEach(function(av) {
              var avCls = AVATAR_CLASSES[av] || 'a';
              avatarsHtml += '<div class="av ' + avCls + '">' + av + '</div>';
            });
            avatarsHtml += '</div>';
          }

          html += '<div class="task' + isDone + '" data-id="' + t.id + '">';
          html += '<button class="task-star' + favClass + '" data-star="' + t.id + '">' + starChar + '</button>';
          html += '<h4><span class="priority ' + t.priority + '"></span>' + escapeHtml(t.title) + '</h4>';
          html += '<p>' + escapeHtml(t.desc) + '</p>';
          html += '<div class="task-footer"><div class="task-tags">' + tagsHtml + '</div>';
          html += '<span class="task-date">' + formatDate(t.date) + '</span></div>';
          html += avatarsHtml;
          html += '</div>';
        });
      }

      html += '<div class="add-task" data-column="' + col.key + '">+ Добавить задачу</div>';
      html += '</div>';
    });

    container.innerHTML = html;

    // Animate cards in
    if (animate) {
      var cols = container.querySelectorAll('.column');
      cols.forEach(function(col, ci) {
        setTimeout(function() { col.classList.add('visible'); }, ci * 100);
      });
      var taskEls = container.querySelectorAll('.task');
      taskEls.forEach(function(el, i) {
        setTimeout(function() { el.classList.add('visible'); }, 200 + i * 60);
      });
    }

    updateCounts();
    bindTaskEvents();
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function updateCounts() {
    var allCount = tasks.length;
    var inworkCount = tasks.filter(function(t) { return t.status === 'inwork'; }).length;
    var doneCount = tasks.filter(function(t) { return t.status === 'done'; }).length;
    var favCount = tasks.filter(function(t) { return t.favorite; }).length;

    var elAll = document.getElementById('countAll');
    var elInwork = document.getElementById('countInwork');
    var elDone = document.getElementById('countDone');
    var elFav = document.getElementById('countFavorites');

    if (elAll) elAll.textContent = allCount;
    if (elInwork) elInwork.textContent = inworkCount;
    if (elDone) elDone.textContent = doneCount;
    if (elFav) elFav.textContent = favCount;
  }

  /* ===== TASK CARD EVENTS ===== */
  function bindTaskEvents() {
    // Star toggles
    document.querySelectorAll('.task-star').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = parseInt(this.dataset.star);
        var task = tasks.find(function(t) { return t.id === id; });
        if (task) {
          task.favorite = !task.favorite;
          this.classList.toggle('active');
          this.textContent = task.favorite ? '★' : '☆';
          // Pop animation
          this.classList.remove('pop');
          void this.offsetWidth;
          this.classList.add('pop');
          updateCounts();
          // If we're in favorites view and unfavorited, re-render
          if (currentFilter === 'favorites' && !task.favorite) {
            render(false);
            // Re-animate
            var taskEls = document.querySelectorAll('.task');
            taskEls.forEach(function(el, i) {
              setTimeout(function() { el.classList.add('visible'); }, i * 60);
            });
          }
        }
      });
    });

    // Task click -> open detail modal
    document.querySelectorAll('.task').forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (e.target.classList.contains('task-star')) return;
        var id = parseInt(this.dataset.id);
        openDetailModal(id);
      });
    });

    // Add task buttons
    document.querySelectorAll('.add-task').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var column = this.dataset.column;
        openNewTaskModal(column);
      });
    });
  }

  /* ===== MODAL HELPERS ===== */
  function openModal(html) {
    var container = document.getElementById('modalContainer');
    container.innerHTML = '<div class="modal-overlay" id="modalOverlay"><div class="modal">' + html + '</div></div>';

    // Close on overlay click
    var overlay = document.getElementById('modalOverlay');
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeModal();
    });

    // Close on Escape
    document.addEventListener('keydown', handleEscape);
  }

  function handleEscape(e) {
    if (e.key === 'Escape') closeModal();
  }

  function closeModal() {
    var overlay = document.getElementById('modalOverlay');
    if (!overlay) return;
    overlay.classList.add('closing');
    setTimeout(function() {
      document.getElementById('modalContainer').innerHTML = '';
    }, 200);
    document.removeEventListener('keydown', handleEscape);
  }

  /* ===== DETAIL MODAL ===== */
  function openDetailModal(taskId) {
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (!task) return;

    var priorityOptions = ['high', 'medium', 'low'];
    var priorityLabels = { high: 'Высокий', medium: 'Средний', low: 'Низкий' };
    var statusOptions = ['todo', 'inwork', 'done'];
    var statusLabels = { todo: 'К выполнению', inwork: 'В работе', done: 'Готово' };
    var allTags = ['Frontend', 'Backend', 'Дизайн', 'DevOps', 'Баг'];
    var allAvatars = ['А', 'М', 'О'];

    var html = '';
    html += '<button class="modal-close" id="modalCloseBtn">✕</button>';
    html += '<input type="text" class="editable-title" id="editTitle" value="' + escapeAttr(task.title) + '">';
    html += '<div class="modal-field"><label>Описание</label>';
    html += '<textarea class="editable-desc" id="editDesc">' + escapeHtml(task.desc) + '</textarea></div>';

    // Priority
    html += '<div class="modal-field"><label>Приоритет</label><div class="priority-selector" id="editPriority">';
    priorityOptions.forEach(function(p) {
      var active = task.priority === p ? ' active-' + p : '';
      html += '<div class="priority-option' + active + '" data-priority="' + p + '">';
      html += '<span class="priority-dot ' + p + '"></span>' + priorityLabels[p] + '</div>';
    });
    html += '</div></div>';

    // Status
    html += '<div class="modal-field"><label>Статус</label><div class="status-selector" id="editStatus">';
    statusOptions.forEach(function(s) {
      var active = task.status === s ? ' active' : '';
      html += '<div class="status-option' + active + '" data-status="' + s + '">' + statusLabels[s] + '</div>';
    });
    html += '</div></div>';

    // Date
    html += '<div class="modal-field"><label>Срок</label>';
    html += '<input type="date" id="editDate" value="' + (task.date || '') + '"></div>';

    // Tags
    html += '<div class="modal-field"><label>Теги</label><div class="tag-selector" id="editTags">';
    allTags.forEach(function(tag) {
      var active = task.tags.indexOf(tag) !== -1 ? ' active' : '';
      html += '<div class="tag-option' + active + '" data-tag="' + tag + '">' + tag + '</div>';
    });
    html += '</div></div>';

    // Avatars
    html += '<div class="modal-field"><label>Исполнители</label><div class="avatar-selector" id="editAvatars">';
    allAvatars.forEach(function(av) {
      var avCls = AVATAR_CLASSES[av] || 'a';
      var active = task.avatars.indexOf(av) !== -1 ? ' active' : '';
      html += '<div class="avatar-option av ' + avCls + active + '" data-avatar="' + av + '">' + av + '</div>';
    });
    html += '</div></div>';

    // Buttons
    html += '<div class="modal-actions">';
    html += '<button class="btn-save" id="saveTaskBtn">Сохранить</button>';
    html += '<button class="btn-delete" id="deleteTaskBtn">Удалить</button>';
    html += '</div>';

    openModal(html);

    // Bind modal events
    setTimeout(function() {
      // Close button
      var closeBtn = document.getElementById('modalCloseBtn');
      if (closeBtn) closeBtn.addEventListener('click', closeModal);

      // Priority selector
      document.querySelectorAll('#editPriority .priority-option').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('#editPriority .priority-option').forEach(function(o) {
            o.className = 'priority-option';
          });
          var p = this.dataset.priority;
          this.classList.add('active-' + p);
        });
      });

      // Status selector
      document.querySelectorAll('#editStatus .status-option').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('#editStatus .status-option').forEach(function(o) {
            o.classList.remove('active');
          });
          this.classList.add('active');
        });
      });

      // Tag toggles
      document.querySelectorAll('#editTags .tag-option').forEach(function(el) {
        el.addEventListener('click', function() {
          this.classList.toggle('active');
        });
      });

      // Avatar toggles
      document.querySelectorAll('#editAvatars .avatar-option').forEach(function(el) {
        el.addEventListener('click', function() {
          this.classList.toggle('active');
        });
      });

      // Save
      var saveBtn = document.getElementById('saveTaskBtn');
      if (saveBtn) {
        saveBtn.addEventListener('click', function() {
          var newTitle = document.getElementById('editTitle').value.trim();
          var newDesc = document.getElementById('editDesc').value.trim();
          var activePriority = document.querySelector('#editPriority .priority-option[class*="active-"]');
          var newPriority = activePriority ? activePriority.dataset.priority : task.priority;
          var activeStatus = document.querySelector('#editStatus .status-option.active');
          var newStatus = activeStatus ? activeStatus.dataset.status : task.status;
          var newDate = document.getElementById('editDate').value;
          var newTags = [];
          document.querySelectorAll('#editTags .tag-option.active').forEach(function(el) {
            newTags.push(el.dataset.tag);
          });
          var newAvatars = [];
          document.querySelectorAll('#editAvatars .avatar-option.active').forEach(function(el) {
            newAvatars.push(el.dataset.avatar);
          });

          if (!newTitle) {
            document.getElementById('editTitle').style.borderBottomColor = '#f87171';
            return;
          }

          task.title = newTitle;
          task.desc = newDesc;
          task.priority = newPriority;
          var oldStatus = task.status;
          task.status = newStatus;
          task.date = newDate;
          task.tags = newTags;
          task.avatars = newAvatars;

          closeModal();

          // Re-render with animation
          render(false);
          animateAllTasks();
        });
      }

      // Delete
      var deleteBtn = document.getElementById('deleteTaskBtn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', function() {
          // Find the task card in DOM and animate out
          var taskEl = document.querySelector('.task[data-id="' + taskId + '"]');
          if (taskEl) {
            taskEl.classList.add('removing');
            setTimeout(function() {
              tasks = tasks.filter(function(t) { return t.id !== taskId; });
              closeModal();
              render(false);
              animateAllTasks();
            }, 400);
          } else {
            tasks = tasks.filter(function(t) { return t.id !== taskId; });
            closeModal();
            render(false);
            animateAllTasks();
          }
        });
      }
    }, 50);
  }

  function escapeAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ===== NEW TASK MODAL ===== */
  function openNewTaskModal(defaultColumn) {
    var priorityOptions = ['high', 'medium', 'low'];
    var priorityLabels = { high: 'Высокий', medium: 'Средний', low: 'Низкий' };
    var statusOptions = ['todo', 'inwork', 'done'];
    var statusLabels = { todo: 'К выполнению', inwork: 'В работе', done: 'Готово' };
    var allTags = ['Frontend', 'Backend', 'Дизайн', 'DevOps', 'Баг'];

    var html = '';
    html += '<button class="modal-close" id="modalCloseBtn">✕</button>';
    html += '<h2>Новая задача</h2>';

    // Title
    html += '<div class="modal-field"><label>Название *</label>';
    html += '<input type="text" id="newTitle" placeholder="Введите название задачи..."></div>';

    // Description
    html += '<div class="modal-field"><label>Описание</label>';
    html += '<textarea id="newDesc" placeholder="Опишите задачу..."></textarea></div>';

    // Priority
    html += '<div class="modal-field"><label>Приоритет</label><div class="priority-selector" id="newPriority">';
    priorityOptions.forEach(function(p, i) {
      var active = i === 1 ? ' active-' + p : ''; // default medium
      html += '<div class="priority-option' + active + '" data-priority="' + p + '">';
      html += '<span class="priority-dot ' + p + '"></span>' + priorityLabels[p] + '</div>';
    });
    html += '</div></div>';

    // Column/Status
    var defaultCol = defaultColumn || 'todo';
    html += '<div class="modal-field"><label>Колонка</label><div class="status-selector" id="newStatus">';
    statusOptions.forEach(function(s) {
      var active = s === defaultCol ? ' active' : '';
      html += '<div class="status-option' + active + '" data-status="' + s + '">' + statusLabels[s] + '</div>';
    });
    html += '</div></div>';

    // Tags
    html += '<div class="modal-field"><label>Теги</label><div class="tag-selector" id="newTags">';
    allTags.forEach(function(tag) {
      html += '<div class="tag-option" data-tag="' + tag + '">' + tag + '</div>';
    });
    html += '</div></div>';

    // Date
    html += '<div class="modal-field"><label>Срок</label>';
    html += '<input type="date" id="newDate"></div>';

    // Create button
    html += '<div class="modal-actions">';
    html += '<button class="btn-create" id="createTaskBtn">Создать</button>';
    html += '</div>';

    openModal(html);

    setTimeout(function() {
      // Close button
      var closeBtn = document.getElementById('modalCloseBtn');
      if (closeBtn) closeBtn.addEventListener('click', closeModal);

      // Priority selector
      document.querySelectorAll('#newPriority .priority-option').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('#newPriority .priority-option').forEach(function(o) {
            o.className = 'priority-option';
          });
          var p = this.dataset.priority;
          this.classList.add('active-' + p);
        });
      });

      // Status selector
      document.querySelectorAll('#newStatus .status-option').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('#newStatus .status-option').forEach(function(o) {
            o.classList.remove('active');
          });
          this.classList.add('active');
        });
      });

      // Tag toggles
      document.querySelectorAll('#newTags .tag-option').forEach(function(el) {
        el.addEventListener('click', function() {
          this.classList.toggle('active');
        });
      });

      // Create
      var createBtn = document.getElementById('createTaskBtn');
      if (createBtn) {
        createBtn.addEventListener('click', function() {
          var title = document.getElementById('newTitle').value.trim();
          var desc = document.getElementById('newDesc').value.trim();
          var activePriority = document.querySelector('#newPriority .priority-option[class*="active-"]');
          var priority = activePriority ? activePriority.dataset.priority : 'medium';
          var activeStatus = document.querySelector('#newStatus .status-option.active');
          var status = activeStatus ? activeStatus.dataset.status : 'todo';
          var date = document.getElementById('newDate').value;
          var tags = [];
          document.querySelectorAll('#newTags .tag-option.active').forEach(function(el) {
            tags.push(el.dataset.tag);
          });

          if (!title) {
            document.getElementById('newTitle').style.borderColor = '#f87171';
            document.getElementById('newTitle').style.boxShadow = '0 0 0 3px rgba(248,113,113,0.15)';
            document.getElementById('newTitle').focus();
            return;
          }

          var newTask = {
            id: nextId++,
            title: title,
            desc: desc || 'Описание задачи...',
            priority: priority,
            status: status,
            tags: tags.length ? tags : ['Frontend'],
            date: date || '',
            avatars: [],
            favorite: false
          };

          tasks.push(newTask);
          closeModal();
          render(false);
          animateAllTasks();
        });
      }
    }, 50);
  }

  /* ===== ANIMATION HELPER ===== */
  function animateAllTasks() {
    var taskEls = document.querySelectorAll('.task');
    taskEls.forEach(function(el, i) {
      setTimeout(function() { el.classList.add('visible'); }, i * 60);
    });
  }

  /* ===== SIDEBAR FILTER ===== */
  function setupSidebar() {
    var items = document.querySelectorAll('.sidebar-item');
    items.forEach(function(item) {
      item.addEventListener('click', function() {
        items.forEach(function(i) { i.classList.remove('active'); });
        this.classList.add('active');
        var filter = this.dataset.filter;
        if (filter) {
          currentFilter = filter;
          render(true);
        }
      });
    });
  }

  /* ===== PRIORITY FILTER ===== */
  function setupPriorityFilters() {
    var btns = document.querySelectorAll('.filter-btn');
    btns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        btns.forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        currentPriority = this.dataset.priority;
        render(false);
        animateAllTasks();
      });
    });
  }

  /* ===== SEARCH ===== */
  function setupSearch() {
    var input = document.getElementById('searchInput');
    var timeout;
    input.addEventListener('input', function() {
      clearTimeout(timeout);
      var val = this.value;
      timeout = setTimeout(function() {
        searchQuery = val;
        render(false);
        animateAllTasks();
      }, 200);
    });
  }

  /* ===== NEW TASK BUTTON ===== */
  function setupNewTaskBtn() {
    var btn = document.getElementById('newTaskBtn');
    if (btn) {
      btn.addEventListener('click', function() {
        openNewTaskModal('todo');
      });
    }
  }

  /* ===== LOADER ===== */
  var loader = document.getElementById('loader');
  setTimeout(function() {
    loader.classList.add('hidden');
    startApp();
  }, 1400);

  /* ===== APP START ===== */
  function startApp() {
    var app = document.getElementById('app');
    app.classList.add('visible');

    /* Header slide down */
    setTimeout(function() {
      document.getElementById('header').classList.add('visible');
    }, 100);

    /* Layout visible */
    setTimeout(function() {
      document.getElementById('layout').classList.add('visible');
    }, 300);

    /* Sidebar items stagger */
    var sidebarItems = document.querySelectorAll('.sidebar-item');
    sidebarItems.forEach(function(item, i) {
      var delay = parseInt(item.dataset.delay) || i;
      setTimeout(function() {
        item.classList.add('visible');
      }, 500 + delay * 60);
    });

    /* Initial render */
    setTimeout(function() {
      render(true);
    }, 400);

    /* Setup interactions */
    setupSidebar();
    setupPriorityFilters();
    setupSearch();
    setupNewTaskBtn();
  }

})();
</script>
</body>
</html>
