<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Dashboard — FutureCode Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --card-hover: #22253a;
            --border: #2a2d3e;
            --text: #e4e4e7;
            --text-muted: #8b8fa3;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --green: #22c55e;
            --orange: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --pink: #ec4899;
            --sidebar-w: 260px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Layout */
        .app { display: flex; min-height: 100vh; }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 8px;
            margin-bottom: 32px;
        }

        .sidebar-logo .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .sidebar-logo span { font-weight: 600; font-size: 18px; }

        .nav-section { margin-bottom: 24px; }

        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: var(--text-muted);
            user-select: none;
        }

        .nav-item:hover { background: var(--card-hover); color: var(--text); }
        .nav-item.active { background: var(--accent); color: white; }

        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

        .nav-badge {
            margin-left: auto;
            background: var(--red);
            color: white;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 600;
        }

        .nav-item.active .nav-badge { background: rgba(255,255,255,0.25); }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 8px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .sidebar-user-info { flex: 1; }
        .sidebar-user-info .name { font-size: 13px; font-weight: 500; }
        .sidebar-user-info .role { font-size: 11px; color: var(--text-muted); }

        .main {
            flex: 1;
            margin-left: var(--sidebar-w);
            padding: 24px 32px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h1 { font-size: 24px; font-weight: 600; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--text-muted);
            transition: border-color 0.2s;
        }

        .search-box:focus-within { border-color: var(--accent); }

        .search-box input {
            background: none;
            border: none;
            color: var(--text);
            outline: none;
            font-size: 13px;
            width: 180px;
            font-family: inherit;
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            position: relative;
        }

        .icon-btn:hover { background: var(--card-hover); color: var(--text); }

        .icon-btn .dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 7px;
            height: 7px;
            background: var(--red);
            border-radius: 50%;
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: 0.2s;
        }

        .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .stat-card .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stat-card .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .stat-card .stat-change {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .stat-change.up { background: rgba(34,197,94,0.15); color: var(--green); }
        .stat-change.down { background: rgba(239,68,68,0.15); color: var(--red); }

        .stat-card .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .chart-header h3 { font-size: 15px; font-weight: 500; }

        .chart-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 3px;
            border-radius: 6px;
        }

        .chart-tab {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
            user-select: none;
        }

        .chart-tab.active { background: var(--accent); color: white; }
        .chart-tab:hover:not(.active) { color: var(--text); }

        .chart-area {
            height: 200px;
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            padding-top: 20px;
        }

        .chart-bar {
            flex: 1;
            border-radius: 4px 4px 0 0;
            transition: height 0.5s cubic-bezier(0.4,0,0.2,1), background 0.3s;
            cursor: pointer;
            min-width: 8px;
            position: relative;
        }

        .chart-bar:hover { opacity: 0.8; }

        .chart-bar-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Donut chart */
        .donut-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .donut {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: conic-gradient(
                var(--accent) 0deg 130deg,
                var(--green) 130deg 220deg,
                var(--orange) 220deg 290deg,
                var(--pink) 290deg 360deg
            );
            position: relative;
            transition: background 0.5s;
        }

        .donut::after {
            content: '78%';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
        }

        .donut-legend {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-item span:last-child { margin-left: auto; font-weight: 500; }

        /* Table */
        .table-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .table-header h3 { font-size: 15px; font-weight: 500; }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-light); }

        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--card-hover); color: var(--text); }

        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { opacity: 0.85; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td { background: var(--card-hover); }
        tr { cursor: pointer; transition: 0.15s; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .status-badge.completed { background: rgba(34,197,94,0.15); color: var(--green); }
        .status-badge.pending { background: rgba(245,158,11,0.15); color: var(--orange); }
        .status-badge.cancelled { background: rgba(239,68,68,0.15); color: var(--red); }
        .status-badge.processing { background: rgba(59,130,246,0.15); color: var(--blue); }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .user-avatar-lg {
            width: 48px;
            height: 48px;
            font-size: 16px;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 560px;
            max-width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        .modal-overlay.open .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h2 { font-size: 18px; font-weight: 600; }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg);
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }

        .modal-close:hover { background: var(--card-hover); color: var(--text); }

        .modal-body { padding: 24px; }

        .modal-section { margin-bottom: 20px; }
        .modal-section:last-child { margin-bottom: 0; }
        .modal-section h4 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .detail-row:last-child { border-bottom: none; }
        .detail-row .label { color: var(--text-muted); }
        .detail-row .value { font-weight: 500; }

        .timeline { display: flex; flex-direction: column; gap: 0; }

        .timeline-item {
            display: flex;
            gap: 12px;
            padding-bottom: 16px;
            position: relative;
        }

        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 20px;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }

        .timeline-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .timeline-content .tl-title { font-size: 13px; font-weight: 500; }
        .timeline-content .tl-time { font-size: 11px; color: var(--text-muted); }

        /* Notification Panel */
        .notif-panel {
            position: absolute;
            top: 48px;
            right: 0;
            width: 360px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
            transition: all 0.2s;
        }

        .notif-panel.open {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .notif-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .notif-panel-header h3 { font-size: 14px; font-weight: 600; }

        .notif-mark-all {
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: 0.2s;
        }

        .notif-mark-all:hover { color: var(--accent-light); }

        .notif-list { max-height: 320px; overflow-y: auto; }

        .notif-item {
            display: flex;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.15s;
        }

        .notif-item:hover { background: var(--card-hover); }
        .notif-item.unread { background: rgba(99,102,241,0.06); }

        .notif-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .notif-content { flex: 1; min-width: 0; }
        .notif-content .notif-text { font-size: 13px; line-height: 1.4; }
        .notif-content .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

        .notif-unread-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            margin-top: 6px;
        }

        /* View transitions */
        .view-container {
            animation: viewFadeIn 0.3s ease-out;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Users page */
        .users-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .users-search {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-muted);
            transition: border-color 0.2s;
        }

        .users-search:focus-within { border-color: var(--accent); }

        .users-search input {
            background: none;
            border: none;
            color: var(--text);
            outline: none;
            font-size: 13px;
            width: 100%;
            font-family: inherit;
        }

        .users-search input::placeholder { color: var(--text-muted); }

        .filter-btn {
            padding: 10px 16px;
            border-radius: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover { background: var(--card-hover); color: var(--text); }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .user-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: 0.2s;
            cursor: pointer;
        }

        .user-card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .user-card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .user-card-info .uc-name { font-size: 14px; font-weight: 600; }
        .user-card-info .uc-role { font-size: 12px; color: var(--text-muted); }

        .user-card-stats {
            display: flex;
            gap: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .uc-stat { text-align: center; flex: 1; }
        .uc-stat .uc-stat-val { font-size: 16px; font-weight: 600; }
        .uc-stat .uc-stat-label { font-size: 11px; color: var(--text-muted); }

        .user-card-status {
            margin-left: auto;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .user-card-status.online { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
        .user-card-status.offline { background: var(--text-muted); }

        /* Messages page */
        .messages-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            height: 560px;
        }

        .msg-list {
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .msg-list-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
        }

        .msg-item {
            display: flex;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.15s;
        }

        .msg-item:hover { background: var(--card-hover); }
        .msg-item.active { background: rgba(99,102,241,0.1); }

        .msg-preview { flex: 1; min-width: 0; }
        .msg-preview .msg-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .msg-preview .msg-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-meta { text-align: right; flex-shrink: 0; }
        .msg-meta .msg-time { font-size: 11px; color: var(--text-muted); }
        .msg-meta .msg-unread {
            display: inline-block;
            margin-top: 6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 10px;
            line-height: 18px;
            text-align: center;
            font-weight: 600;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-info .ch-name { font-size: 14px; font-weight: 600; }
        .chat-header-info .ch-status { font-size: 12px; color: var(--green); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-msg {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .chat-msg.incoming {

            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-msg.outgoing {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-msg .msg-time-small { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
        .chat-msg.outgoing .msg-time-small { color: rgba(255,255,255,0.6); }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus { border-color: var(--accent); }

        .chat-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--accent);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-send-btn:hover { background: var(--accent-light); }

        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
        }

            grid-template-columns: 220px 1fr;
            gap: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            min-height: 480px;

            padding: 16px 0;

            font-size: 13px;
            cursor: pointer;
            transition: 0.15s;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;

        .settings-nav-item:hover { background: var(--card-hover); color: var(--text); }
        .settings-nav-item.active { color: var(--accent); background: rgba(99,102,241,0.08); border-right: 2px solid var(--accent); }

        .settings-content { padding: 28px; }
        .settings-content h3 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }

        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus { border-color: var(--accent); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .toggle-row:last-child { border-bottom: none; }
        .toggle-label .tl-title { font-size: 14px; font-weight: 500; }
        .toggle-label .tl-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .toggle {
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .toggle.on { background: var(--accent); }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle.on::after { left: 23px; }

        /* Statistics page */
        .stats-big-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-wide-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .stat-wide-card .chart-area { height: 240px; }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--card);

            padding: 20px;

        /* Hamburger button */
        .hamburger-btn {
            display: none;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
            flex-shrink: 0;
        }

        .hamburger-btn:hover { background: var(--card-hover); color: var(--text); }

        /* Mobile sidebar overlay backdrop */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.open { display: block; }

        .sidebar-close-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg);
            border: none;
            color: var(--text-muted);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }

        .sidebar-close-btn:hover { background: var(--card-hover); color: var(--text); }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .users-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-big-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.mobile-open {
                display: flex;
                position: fixed;
                z-index: 1000;
                width: var(--sidebar-w);
                animation: slideInLeft 0.25s ease-out;
            }
            .sidebar.mobile-open .sidebar-close-btn { display: flex; }
            .hamburger-btn { display: flex; }
            .main { margin-left: 0; padding: 16px; }

            .header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .users-grid { grid-template-columns: 1fr; }

            .msg-list { max-height: 240px; }
            .settings-layout { grid-template-columns: 1fr; }

        // ========== CHART RENDERING ==========
        function renderBarChart(container, data, height) {
            const maxVal = Math.max(...data.values);
            container.innerHTML = '';
            container.style.height = (height || 200) + 'px';
            data.values.forEach((v, i) => {
                const pct = (v / maxVal) * 100;
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = '0%';
                bar.style.background = i % 2 === 0 ? 'var(--accent)' : 'var(--accent-light)';
                bar.title = data.labels[i] + ': ' + v;
                container.appendChild(bar);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        bar.style.height = pct + '%';
                    });
                });
            });
            // labels row
            const labelsDiv = document.createElement('div');
            labelsDiv.style.cssText = 'display:flex;gap:3px;padding-top:4px;';
            data.labels.forEach(l => {
                const lbl = document.createElement('div');
                lbl.style.cssText = 'flex:1;text-align:center;font-size:10px;color:var(--text-muted);min-width:8px;';
                lbl.textContent = l;
                labelsDiv.appendChild(lbl);
            });
            container.parentElement.appendChild(labelsDiv);
        }

                                <div class="msg-item ${currentChatId === m.id ? 'active' : ''}" data-chat-id="${m.id}">
                                    <div class="user-avatar" style="background:${m.color}">${m.initials}</div>
                                    <div class="msg-preview">
                                        <div class="msg-name">${m.name}</div>
                                        <div class="msg-text">${m.lastMsg}</div>
                                    </div>
                                    <div class="msg-meta">
                                        <div class="msg-time">${m.time}</div>
                                        ${m.unread > 0 ? `<div class="msg-unread">${m.unread}</div>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="chat-area" id="chatArea">
                            ${currentChatId ? renderChatView(currentChatId) : '<div class="chat-empty">Выберите чат для начала общения</div>'}
                        </div>
                    </div>
                </div>
            `;

            viewContainer.querySelectorAll('.msg-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentChatId = parseInt(item.dataset.chatId);
                    const msg = messages.find(m => m.id === currentChatId);
                    if (msg) msg.unread = 0;
                    renderMessages();
                });
            });

            // Wire chat send
            const chatInput = document.getElementById('chatInputField');
            const sendBtn = document.getElementById('chatSendBtn');
            if (chatInput && sendBtn) {
                const doSend = () => {
                    const text = chatInput.value.trim();
                    if (!text || !currentChatId) return;
                    const msg = messages.find(m => m.id === currentChatId);
                    if (msg) {
                        msg.chat.push({ text, incoming: false, time: new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) });
                        msg.lastMsg = text;
                        msg.time = 'Сейчас';
                    }
                    renderMessages();
                };
                sendBtn.addEventListener('click', doSend);
                chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(); });
            }
        }

        function renderChatView(chatId) {
            const m = messages.find(x => x.id === chatId);
            if (!m) return '<div class="chat-empty">Чат не найден</div>';
            return `
                <div class="chat-header">
                    <div class="user-avatar" style="background:${m.color}">${m.initials}</div>
                    <div class="chat-header-info">
                        <div class="ch-name">${m.name}</div>
                        <div class="ch-status">${m.online ? 'В сети' : 'Не в сети'}</div>
                    </div>
                </div>
                <div class="chat-messages">
                    ${m.chat.map(c => `
                        <div class="chat-msg ${c.incoming ? 'incoming' : 'outgoing'}">
                            ${c.text}
                            <div class="msg-time-small">${c.time}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="chat-input-area">
                    <input type="text" placeholder="Введите сообщение..." id="chatInputField">
                    <button class="chat-send-btn" id="chatSendBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            `;
        }

        // ---- Statistics ----

        let statsChartPeriod = 'week';
        let statsUserPeriod = 'week';

        function initStatsCharts() {
            const revenueChart = document.getElementById('statsBarChart');
            const userChart = document.getElementById('statsUserChart');

            if (revenueChart) {
                const parent = revenueChart.parentElement;
                const old = parent.querySelector('.chart-area + div');
                if (old) old.remove();
                renderBarChart(revenueChart, chartData[statsChartPeriod], 240);
            }
            if (userChart) {
                const parent = userChart.parentElement;
                const old = parent.querySelector('.chart-area + div');
                if (old) old.remove();
                const userData = {
                    week: { labels: chartData.week.labels, values: [30,25,45,35,55,20,40] },
                    month: { labels: chartData.month.labels, values: [20,35,30,45,50,40,60] },
                    year: { labels: chartData.year.labels, values: [15,30,25,40,55,45,65] },
                };
                renderBarChart(userChart, userData[statsUserPeriod], 240);
            }

                            month: { labels: chartData.month.labels, values: [20,35,30,45,50,40,60] },

        }

        // ========== MOBILE SIDEBAR ==========
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
        const sidebarEl = document.querySelector('.sidebar');

        function openMobileSidebar() {
            if (sidebarEl) sidebarEl.classList.add('mobile-open');
            if (sidebarOverlay) sidebarOverlay.classList.add('open');
        }

        function closeMobileSidebar() {
            if (sidebarEl) sidebarEl.classList.remove('mobile-open');
            if (sidebarOverlay) sidebarOverlay.classList.remove('open');
        }

        if (hamburgerBtn) hamburgerBtn.addEventListener('click', openMobileSidebar);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeMobileSidebar);
        if (sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', closeMobileSidebar);

        // ========== INIT ==========
        renderDashboard();

    })();
    </script>
</body>
